name: 🛒 Zara Stok Kontrol

on:
  schedule:
    # 30 dk'da bir tetiklenir; her çalışmada 6×5dk döngüsüyle 30 dk pencere kesintisiz kapsar.
    # Public repo → Actions dakikaları ücretsiz, sleep maliyeti yok.
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  stok-kontrol:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: stok_takip/requirements.txt

      - name: 📦 Bağımlılıkları yükle
        run: pip install -r stok_takip/requirements.txt

      - name: 💾 Önceki stok durumunu yükle
        uses: actions/cache@v4
        with:
          path: stok_takip/stok_durum.json
          key: stok-durum-v2-${{ github.run_id }}
          restore-keys: |
            stok-durum-v2-

      - name: 🔍 Stok kontrol et
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTIONS: "true"
        working-directory: stok_takip
        run: |
          for i in 1 2 3 4 5 6; do
            echo "▶️ Kontrol $i/6 — $(date '+%H:%M')"
            python main.py --tek-seferlik
            if [ "$i" -lt 6 ]; then
              sleep 300
            fi
          done
