name: 🛒 Zara Stok Kontrol

on:
  schedule:
    # GEÇİCİ: Repo public yapılana kadar bütçeyi korumak için tek kontrol.
    # GitHub */5 cron'unu throttle ettiği için bu pratikte ~saatte bir çalışır (~ucuz).
    # Repo public olunca buraya iç döngü eklenip gerçek 5 dk kapsama sağlanacak.
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  stok-kontrol:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: stok_takip/requirements.txt

      - name: 📦 Bağımlılıkları yükle
        run: pip install -r stok_takip/requirements.txt

      - name: 💾 Önceki stok durumunu yükle
        uses: actions/cache@v4
        with:
          path: stok_takip/stok_durum.json
          key: stok-durum-v2-${{ github.run_id }}
          restore-keys: |
            stok-durum-v2-

      - name: 🔍 Stok kontrol et
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTIONS: "true"
        working-directory: stok_takip
        run: |
          python main.py --tek-seferlik
