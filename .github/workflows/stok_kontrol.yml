name: 🛒 Zara Stok Kontrol

on:
  schedule:
    # Normal: 30 dk'da bir, her çalışmada 6×5dk döngüsü
    - cron: "*/30 * * * *"
    # Özel: 24 Haziran 19:30 TRK (=16:30 UTC) — 30×1dk yoğun kontrol
    - cron: "30 16 24 6 *"
  workflow_dispatch:

jobs:
  stok-kontrol:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: stok_takip/requirements.txt

      - name: 📦 Bağımlılıkları yükle
        run: pip install -r stok_takip/requirements.txt

      - name: 💾 Önceki stok durumunu yükle
        uses: actions/cache@v4
        with:
          path: stok_takip/stok_durum.json
          key: stok-durum-v2-${{ github.run_id }}
          restore-keys: |
            stok-durum-v2-

      - name: 🔍 Stok kontrol et
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTIONS: "true"
        working-directory: stok_takip
        run: |
          # 16:30 UTC = 19:30 TRK → 30 tur × 1dk; normal → 6 tur × 5dk
          HOUR_UTC=$(date -u +%H)
          MIN_UTC=$(date -u +%M)
          if [ "$HOUR_UTC" = "16" ] && [ "$MIN_UTC" -ge "29" ] && [ "$MIN_UTC" -le "35" ]; then
            ROUNDS=30; SLEEP=60
            echo "🔥 Yoğun mod: ${ROUNDS} tur × ${SLEEP}s (19:30 TRK penceresi)"
          else
            ROUNDS=6; SLEEP=300
          fi
          for i in $(seq 1 $ROUNDS); do
            echo "▶️ Kontrol $i/$ROUNDS — $(date '+%H:%M')"
            python main.py --tek-seferlik
            if [ "$i" -lt "$ROUNDS" ]; then
              sleep $SLEEP
            fi
          done
