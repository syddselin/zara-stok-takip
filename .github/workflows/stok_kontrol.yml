name: 🛒 Zara Stok Kontrol

on:
  schedule:
    # GitHub kısa aralıklı cron'ları (örn. */5) yoğunlukta atlıyor; bu yüzden
    # 30 dk'da bir tetikleyip her çalışmada iç döngüyle 5 dk arayla 3 kontrol yapıyoruz.
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  stok-kontrol:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: stok_takip/requirements.txt

      - name: 📦 Bağımlılıkları yükle
        run: pip install -r stok_takip/requirements.txt

      - name: 💾 Önceki stok durumunu yükle
        uses: actions/cache@v4
        with:
          path: stok_takip/stok_durum.json
          key: stok-durum-v2-${{ github.run_id }}
          restore-keys: |
            stok-durum-v2-

      - name: 🔍 Stok kontrol et
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTIONS: "true"
        working-directory: stok_takip
        run: |
          # Tek tetiklemede 5 dk arayla 3 kontrol -> her çalışma ~10-15 dk kapsar.
          # Durum dosyası iş boyunca diskte kalır, böylece kontroller arası geçişler de yakalanır.
          for i in 1 2 3; do
            echo "▶️ Kontrol turu $i/3"
            python main.py --tek-seferlik
            if [ "$i" -lt 3 ]; then
              echo "⏳ 5 dakika bekleniyor..."
              sleep 300
            fi
          done
